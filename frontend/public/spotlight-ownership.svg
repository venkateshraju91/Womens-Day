  <circle cx="200" cy="85" r="18" fill="#2b6cb0" opacity="0.5"/>
  <circle cx="240" cy="95" r="15" fill="#2b6cb0" opacity="0.4"/>
  <!-- Growth arrows -->
  <line x1="170" y1="200" x2="170" y2="175" stroke="#4299e1" stroke-width="2" opacity="0.4"/>
