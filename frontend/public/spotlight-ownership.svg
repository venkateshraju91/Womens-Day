  <!-- Decorative -->
  <circle cx="90" cy="60" r="5" fill="#63b3ed" opacity="0.4"/>
  <circle cx="320" cy="50" r="4" fill="#4299e1" opacity="0.3"/>
  <circle cx="70" cy="240" r="4" fill="#90cdf4" opacity="0.4"/>
  <circle cx="340" cy="250" r="5" fill="#63b3ed" opacity="0.3"/>
  <text x="200" y="265" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="600" fill="#2c5282">Ownership Culture</text>
